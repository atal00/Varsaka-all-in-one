    <!-- 📊 Google Analytics 4 (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- 🛡️ Enterprise Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Hardened Content Security Policy (CSP) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://*.supabase.co https://*.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
      img-src 'self' data: https://*.supabase.co https://fonts.gstatic.com https://*.googleusercontent.com https://*.googletagmanager.com;
      font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
      connect-src 'self' https://*.supabase.co https://supabase.co https://*.google.com https://*.formsubmit.co https://formsubmit.co https://*.google-analytics.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://*.formsubmit.co https://formsubmit.co;
      upgrade-insecure-requests;
    " />
    
    <!-- Prevent Clickjacking & MIME Sniffing -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Download-Options" content="noopen" />
    <meta http-equiv="X-Permitted-Cross-Domain-Policies" content="none" />

    <meta property="og:image" content="https://varsaka.com/og-image.png" />
    <meta property="og:url" content="https://varsaka.com" />

    <title>Varsaka Labs – Top Software Testing Company | Quality Engineering</title>
